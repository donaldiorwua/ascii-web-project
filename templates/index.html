<!DOCTYPE html>

<head>
    <title>Home | ASCII Web Application</title>
</head>
</style>

<body style="background-color: lavender;" algn="center">
    <h1 align="center"> Welcome to ASCII Web Application</h1>
    <div style="width: 80%; padding-left: 10%;">
        <div style="width: 46%; float: left; background-color: rgb(110, 145, 115); padding: 2%;">
            <h3 align="center">Select Banner</h3><br>
            <form action="/" method="POST" target="_self">
                <div style="padding-left: 25%;">
                    <input type="radio" id="standard" name="banner_file" value="standard" checked>
                    <label for="standard">Standard</label><br>
                    <input type="radio" id="thinkertoy" name="banner_file" value="thinkertoy">
                    <label for="thinkertoy">Thinkertoy</label><br>
                    <input type="radio" id="shadow" name="banner_file" value="shadow">
                    <label for="shadow">Shadow</label>
                </div>
        </div>
        <div style="width: 46%; background-color: rgb(143, 185, 188); padding: 2%; float: right;">
            <h3 align="center">Enter Text To Render ASCII-Art</h3><br>
            <label for="inputtext">Enter Text:</label>
            <input type="text" name="inputText" id="inputtext"><br>
            {{if .Error }}
            <span style="color: darkred;">{{ .Error }}</span>
            {{end}}
            <br>
            <div style="padding-left: 20%;">
                <input type="submit" value="Generate"><br>
            </div>
            </form>
        </div>
        <br><br>
        <div style="width: auto;"><br><br>
            <span>Select any of the Banners to change the ascii style</span><br><br>
        <form action="/reload" method="GET">
            <input type="hidden" name="inputText" value="{{.InputText}}">
            <button type="submit" name="banner_file" value="standard">Standard</button>
            <button type="submit" name="banner_file" value="shadow">Shadow</button>
            <button type="submit" name="banner_file" value="thinkertoy">Thinkertoy</button>
        </form>
        </div>
        <div style="width: 100%;">
            <form>
                <fieldset>
                    <legend>
                        <h1> ASCII-ART</h1>
                    </legend>
                    <textarea name="message" id="message" rows="10"
                        cols="120">{{if .Result}}{{.Result}}{{end}}</textarea>
                </fieldset>
            </form>
        </div>
    </div>
</body>

</html>
